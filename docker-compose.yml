services:
  langgraph-server:
    image: langchain/langgraph-api:latest
    environment:
      REDIS_URI: redis://redis:6379
      DATABASE_URI: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/agents
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
    volumes:
      - ./orchestration:/app/orchestration
    depends_on:
      - redis
      - postgres
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  approval-gateway:
    build:
      context: ./gateway
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/agents
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LANGGRAPH_API_URL: http://langgraph-server:2024
      LANGGRAPH_API_KEY: ${LANGGRAPH_API_KEY:-}
    depends_on:
      - redis
      - postgres

  conductor-ui:
    build:
      context: ./ui
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://approval-gateway:8000
      NEXT_PUBLIC_LANGFUSE_URL: http://langfuse:3000
    depends_on:
      - approval-gateway

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-change-me}
      SALT: ${LANGFUSE_SALT:-change-me}
      NEXTAUTH_URL: http://localhost:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
    depends_on:
      - postgres

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    deploy:
      resources:
        limits:
          memory: 4g

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agents}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis_data:/data

  sandbox-manager:
    build:
      context: ./sandbox
    privileged: true
    ports:
      - "8002:8002"
    volumes:
      - /opt/sandboxes:/opt/sandboxes
      - /dev/kvm:/dev/kvm
    environment:
      MAX_CONCURRENT_SANDBOXES: "5"
      SANDBOX_TIMEOUT_SEC: "120"
      ALLOWED_EGRESS_HOSTS: pypi.org,registry.npmjs.org,api.github.com

  webhook-indexer:
    build:
      context: ./indexer
    ports:
      - "8001:8001"
    environment:
      GITHUB_WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    command: ["uvicorn", "indexer.webhook:app", "--host", "0.0.0.0", "--port", "8001"]
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  pg_data:
  redis_data:
