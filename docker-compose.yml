services:
  ollama:
    image: ollama/ollama:latest
    container_name: local_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      
  orchestrator:
    build: .
    container_name: local_orchestrator
    depends_on:
      - ollama
    # Keep the container alive so the script can be run manually
    command: ["tail", "-f", "/dev/null"]

volumes:
  ollama_data: